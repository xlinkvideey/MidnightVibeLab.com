<a class="btn" href="#" onclick="startFakeLoading()">𝗣𝗟𝗔𝗬 𝗩𝗜𝗗𝗘𝗢</a> <a class="btn" href="#" onclick="startFakeLoading()">𝗦𝗘𝗥𝗩𝗘𝗥 𝟏</a> <a class="btn" href="#" onclick="startFakeLoading()">𝗛𝗢𝗠𝗘</a>

<p style="font-size:12px; opacity:0.7;">
✔ Fast streaming • ✔ No signup • ✔ Free access
</p>

</div>  

<script>
const ad1 = "https://www.effectivecpmnetwork.com/twg5ircn84?key=8c5fcf1fe5463d64c40961ee4908191c";
const ad2 = "https://www.effectivecpmnetwork.com/twg5ircn84?key=8c5fcf1fe5463d64c40961ee4908191c";
const ad3 = "https://www.effectivecpmnetwork.com/bpyh2n3u1?key=365cd9a5147798a9f666011d6cbcd8f0";

function startFakeLoading(){
const bar = document.getElementById("loadingBar");
const box = document.getElementById("loadingBox");
const text = document.getElementById("statusText");


const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;


const tier1 = ["America","New_York","Los_Angeles","Chicago","Toronto","London"];
const tier2 = ["Europe","Berlin","Paris","Madrid","Rome"];


let pool;


if(tier1.some(z => tz.includes(z))){
  pool = [ad1, ad2]; // high value
}else if(tier2.some(z => tz.includes(z))){
  pool = [ad2, ad3]; // mid
}else{
  pool = [ad3, ad1]; // fallback
}


const finalLink = pool[Math.floor(Math.random()*pool.length)];

box.style.display = "block";
text.innerText = "Processing video... please wait";

let progress = 0;

let interval = setInterval(()=>{
progress += Math.random() * 20;

if(progress >= 100){
progress = 100;
clearInterval(interval);

text.innerText = "Opening video...";

setTimeout(()=>{
window.open(finalLink, "_blank");


box.style.display = "none";
bar.style.width = "0%";
text.innerText = "Video is loading... please click below to continue";

}, 500);
}

bar.style.width = progress + "%";

}, 300);
}
</script>
